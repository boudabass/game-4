version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      # Variables d'environnement pour Odoo (à remplir dans le panel Coolify)
      # - ODOO_URL=https://www.theelsassisch.com
      # - ODOO_DB=theelsassisch
    restart: unless-stopped